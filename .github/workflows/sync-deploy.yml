name: Sync & Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [strava-activity]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch activity from Strava
        run: |
          ACTIVITY_ID="${{ github.event.client_payload.activity_id }}"
          if [ -n "$ACTIVITY_ID" ] && [ "$ACTIVITY_ID" != "null" ]; then
            echo "Fetching single activity: $ACTIVITY_ID"
            node scripts/fetch-all-activities.mjs --activity "$ACTIVITY_ID"
          else
            echo "No activity ID — fetching recent activities"
            node scripts/fetch-all-activities.mjs
          fi

      - name: Sync routes
        run: node scripts/sync-routes.mjs

      - name: Sync activities
        run: node scripts/sync-activities.mjs

      - name: Update Strava refresh token secret
        if: hashFiles('.strava-refresh-token') != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set STRAVA_REFRESH_TOKEN --body "$(cat .strava-refresh-token)"
          rm .strava-refresh-token
          echo "✅ Updated STRAVA_REFRESH_TOKEN secret"

      - name: Build site
        run: npx astro build

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Auto-sync: update route data [skip ci]"
            git push
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
